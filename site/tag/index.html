<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>标签模式 · Cards</title>
    <link rel="stylesheet" href="../assets/app.css" />
  </head>
  <body>
    <main class="page page--actionbar">
      <header class="topbar">
        <nav class="nav-group">
          <a class="nav-item" href="../random/">随机</a>
          <a class="nav-item" href="../list/">列表</a>
          <a class="nav-item is-active" href="../tag/">标签</a>
        </nav>
      </header>

      <section class="panel panel--card">
        <div class="filters">
          <input
            id="tagSearch"
            class="input is-hidden"
            type="search"
            placeholder="搜索标签…"
            autocomplete="off"
          />
          <button id="clearTag" class="btn btn--small is-hidden" type="button">清空</button>
        </div>

        <div id="tagListContainer" class="chips-container">
          <div id="tagList" class="chips" aria-label="标签列表"></div>
        </div>
        <button id="toggleTags" class="toggle-tags" type="button">展开全部标签</button>

        <div class="panel__body">
          <div class="meta">
            <span id="modeInfo" class="pill">请选择一个标签</span>
            <span id="counter" class="pill">-</span>
            <span id="tagLine" class="tags"></span>
          </div>
          <div id="answer" class="card__answer is-hidden"></div>
        </div>
        <div class="panel__question">
          <div id="question" class="card__question"></div>
        </div>
      </section>

      <footer class="footer">

      </footer>
    </main>

    <div class="actionbar" role="region" aria-label="操作区">
      <div class="actionbar__inner">
        <button id="prevCard" class="btn" type="button" disabled>上一个</button>
        <button id="nextCard" class="btn" type="button" disabled>下一个</button>
      </div>
    </div>

    <script type="module" src="../assets/tag.js"></script>
  </body>
</html>
